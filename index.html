<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Технические работы</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: rgba(255,255,255,0.06);
      --text-primary: #f0f0f0;
      --text-secondary: #555;
      --accent: #ffffff;
      --dot: rgba(255,255,255,0.04);
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 36px 36px;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.03) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 3rem;
    }

    .icon-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-ring {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      animation: pulse-ring 3s ease-in-out infinite;
    }
    .icon-ring:nth-child(2) {
      width: 96px;
      height: 96px;
      animation-delay: 0.6s;
      border-color: rgba(255,255,255,0.04);
    }
    .icon-ring:nth-child(3) {
      width: 124px;
      height: 124px;
      animation-delay: 1.2s;
      border-color: rgba(255,255,255,0.02);
    }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.5; }
    }

    .icon-svg {
      position: relative;
      width: 44px;
      height: 44px;
      animation: spin-slow 12s linear infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .text-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .heading {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .heading span {
      display: block;
      font-weight: 500;
    }

    .sub {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.01em;
      max-width: 320px;
      line-height: 1.7;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.02);
      margin-top: 0.5rem;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ffffff;
      opacity: 0.6;
      animation: blink 2.2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.15; }
    }

    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
    }

    .progress-wrap {
      width: min(320px, 80vw);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .progress-meta span {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .progress-track {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.5);
      border-radius: 999px;
      animation: fill 6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fill {
      0%   { width: 0%; }
      30%  { width: 35%; }
      55%  { width: 58%; }
      80%  { width: 72%; }
      100% { width: 80%; }
    }

    .bottom {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      z-index: 1;
    }

    .bottom-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .bottom-item .val {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
    }

    #clock {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.15em;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="icon-wrap">
      <div class="icon-ring"></div>
      <div class="icon-ring"></div>
      <div class="icon-ring"></div>
      <svg class="icon-svg" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="21" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <path d="M22 8v4M22 32v4M8 22h4M32 22h4" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"/>
        <path d="M13.1 13.1l2.83 2.83M28.07 28.07l2.83 2.83M13.1 30.9l2.83-2.83M28.07 15.93l2.83-2.83" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
        <circle cx="22" cy="22" r="4" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <circle cx="22" cy="22" r="1.5" fill="rgba(255,255,255,0.6)"/>
      </svg>
    </div>

    <div class="text-block">
      <p class="label">Уведомление</p>
      <h1 class="heading">Технические<span>работы</span></h1>
      <p class="sub">Мы улучшаем систему.<br>Скоро всё вернётся в норму.</p>
      <div class="status">
        <span class="status-dot"></span>
        В процессе
      </div>
    </div>

    <div class="divider"></div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Прогресс</span>
        <span id="pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="fill"></div>
      </div>
    </div>

  </div>

  <div class="bottom">
    <div class="bottom-item">
      <span class="val" id="clock">--:--:--</span>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    const fill = document.getElementById('fill');
    const pct = document.getElementById('pct');
    const totalMs = 6000;

    let start = null;
    const keyframes = [
      { t: 0,    v: 0  },
      { t: 0.30, v: 35 },
      { t: 0.55, v: 58 },
      { t: 0.80, v: 72 },
      { t: 1.00, v: 80 },
    ];

    function lerp(a, b, t) { return a + (b - a) * t; }

    function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    function animatePct(timestamp) {
      if (!start) start = timestamp;
      const elapsed = (timestamp - start) / totalMs;
      const progress = Math.min(elapsed, 1);

      let value = 0;
      for (let i = 1; i < keyframes.length; i++) {
        const prev = keyframes[i - 1];
        const curr = keyframes[i];
        if (progress <= curr.t) {
          const seg = (progress - prev.t) / (curr.t - prev.t);
          value = lerp(prev.v, curr.v, easeInOut(seg));
          break;
        }
        value = curr.v;
      }

      pct.textContent = Math.round(value) + '%';

      if (progress < 1) {
        requestAnimationFrame(animatePct);
      }
    }

    requestAnimationFrame(animatePct);
  </script>

</body>
</html>
